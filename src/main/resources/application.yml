spring:
  application:
    name: email-micro-service

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${EMAIL_USERNAME}
    password: ${EMAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

server:
  port: 8080

email:
  from: ${EMAIL_FROM:${EMAIL_USERNAME}}
  retry:
    max-attempts: 3
    delay-ms: 2000

security:
  enabled: true
  api-key: email-svc-dev-key-9f3c2b7a

logging:
  level:
    com.example.email_micro_service: INFO
